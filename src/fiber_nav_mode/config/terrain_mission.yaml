vtol_navigation_node:
  ros__parameters:
    cruise_altitude: 60.0
    climb_rate: 4.0
    fw_accept_radius: 60.0
    mc_transition_dist: 200.0
    mc_approach_speed: 5.0
    fw_transition_timeout: 60.0
    mc_transition_timeout: 60.0

    terrain_follow:
      enabled: true
      target_agl: 40.0             # [m] higher AGL for ridge safety margin
      kp: 0.2
      max_rate: 1.0
      rate_slew: 0.25             # [m/s] relaxed — feedforward compensates, higher AGL gives margin
      filter_tau: 3.0             # [s] heavy smoothing to damp terrain noise
      fallback_timeout: 30.0
      min_agl: 10.0
      max_agl: 200.0
      # Look-ahead parameters
      lookahead_time: 3.0
      lookahead_max: 100.0
      feedforward_gain: 0.5       # sensor-derived slope feedforward
      max_slope: 0.5
      slope_tau: 1.0              # [s] EMA filter for terrain slope estimation

    cable_monitor:
      enabled: true
      tension_warn_percent: 70.0
      tension_abort_percent: 85.0
      breaking_strength: 50.0
      spool_capacity: 7500.0       # m (-1 = unlimited)
      spool_warn_percent: 80.0
      spool_abort_percent: 95.0

    # SSE diagonal path crossing ridge obliquely at ~140° heading
    # Terrain: 6km x 6km, 141-194m MSL (53m range)
    # Path crosses the N-S ridge (y≈0, +15m over 300m) at a shallow angle
    # All heading changes < 13° (tailsitter safe), max gradient 0.06 m/m
    # Terrain range on path: 163-177m MSL (14m variation)
    # With target_agl=40m, worst estimated AGL ≈ 28m (18m above min_agl)
    # Total distance: 2100m, flight time ~117s at 18 m/s
    waypoints:
      x: [0.0, 150.0, 350.0, 550.0, 750.0, 950.0, 1100.0, 1200.0]
      y: [200.0, 0.0, -200.0, -450.0, -700.0, -950.0, -1200.0, -1500.0]
