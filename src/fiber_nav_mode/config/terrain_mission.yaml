vtol_navigation_node:
  ros__parameters:
    cruise_altitude: 80.0
    climb_rate: 4.0
    fw_accept_radius: 60.0
    mc_transition_dist: 200.0
    mc_approach_speed: 5.0
    fw_transition_timeout: 30.0
    mc_transition_timeout: 60.0

    terrain_follow:
      enabled: true
      target_agl: 30.0
      kp: 0.5
      max_rate: 3.0
      filter_tau: 0.5
      fallback_timeout: 5.0
      min_agl: 10.0
      max_agl: 200.0
      # Look-ahead parameters
      lookahead_time: 3.0
      lookahead_max: 100.0
      feedforward_gain: 0.8
      max_slope: 0.5

    # Terrain world waypoints: fly east with some north/south variation
    # Terrain is 6km x 6km, elevation 141-194m MSL (53m range)
    # Cruise at 80m AGL from home ensures clearance over all terrain
    waypoints:
      x: [0.0, 100.0, 0.0, -100.0, 0.0]
      y: [200.0, 500.0, 800.0, 1000.0, 1200.0]
