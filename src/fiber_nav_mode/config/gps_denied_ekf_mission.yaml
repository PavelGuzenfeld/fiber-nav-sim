vtol_navigation_node:
  ros__parameters:
    cruise_altitude: 30.0
    climb_rate: 4.0
    fw_accept_radius: 50.0
    mc_transition_dist: 200.0
    mc_approach_speed: 5.0
    fw_transition_timeout: 30.0
    mc_transition_timeout: 60.0

    terrain_follow:
      enabled: false

    cable_monitor:
      enabled: true
      tension_warn_percent: 70.0
      tension_abort_percent: 85.0
      breaking_strength: 50.0
      spool_capacity: 7500.0       # m (-1 = unlimited)
      spool_warn_percent: 80.0
      spool_abort_percent: 95.0

    gps_denied:
      enabled: true
      wp_time_s: 30.0              # seconds per WP leg (safety net)
      return_time_s: 300.0         # seconds of FW return (safety net)
      descent_time_s: 60.0         # seconds of MC descent (safety net)
      altitude_kp: 0.5             # P-gain for altitude hold
      altitude_max_vz: 3.0         # max vertical rate [m/s]
      fw_speed: 18.0               # FW cruise speed [m/s]
      use_position_ekf: true       # Enable dead-reckoning EKF position steering
      ekf_wp_accept_radius: 80.0   # WP acceptance radius [m]
      ekf_home_accept_radius: 100.0  # Home acceptance radius [m]
      ekf_max_uncertainty: 200.0   # Fallback to time-based if sigma > this [m]

    # L-shaped mission — tests EKF course correction on turns
    # Leg 1: East (3 WPs at 150m), Leg 2: North-East (2 WPs)
    # GPS disabled after MC climb — navigation uses EKF position steering
    # Time-based fallback always active as safety net
    waypoints:
      x: [0.0, 0.0, 0.0, 100.0, 200.0]
      y: [150.0, 300.0, 450.0, 550.0, 650.0]
