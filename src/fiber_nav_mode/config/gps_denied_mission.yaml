vtol_navigation_node:
  ros__parameters:
    cruise_altitude: 100.0            # TERCOM-optimized: 100m AGL for transition safety
    climb_rate: 4.0
    fw_accept_radius: 80.0
    mc_transition_dist: 200.0
    mc_approach_speed: 5.0
    fw_transition_timeout: 120.0
    mc_transition_timeout: 120.0

    terrain_follow:
      enabled: false
      target_agl: 40.0
      kp: 0.2
      max_rate: 1.0
      rate_slew: 0.25
      filter_tau: 3.0
      fallback_timeout: 30.0
      min_agl: 10.0
      max_agl: 200.0
      lookahead_time: 3.0
      lookahead_max: 100.0
      feedforward_gain: 0.5
      max_slope: 0.5
      slope_tau: 1.0

    cable_monitor:
      enabled: true
      tension_warn_percent: 70.0
      tension_abort_percent: 85.0
      breaking_strength: 50.0
      spool_capacity: 7500.0
      spool_warn_percent: 80.0
      spool_abort_percent: 95.0

    gimbal:
      enabled: true
      saturation_threshold: 0.85
      base_turn_rate: 5.0
      min_turn_rate: 1.0
      min_alt_rate_scale: 0.3

    gps_denied:
      enabled: true
      wp_time_s: 25.0
      return_time_s: 600.0
      descent_time_s: 600.0
      altitude_kp: 0.5
      altitude_max_vz: 3.0
      fw_speed: 18.0
      use_position_ekf: true
      use_position_ekf_navigate: false  # EKF drifts too much for cross-track correction
      ekf_wp_accept_radius: 80.0
      ekf_home_accept_radius: 100.0
      ekf_max_uncertainty: 200.0
      ekf_cross_track_lookahead: 200.0
      turn_heading_tolerance_deg: 10.0

    # TERCOM-optimized route: 8 waypoints through discriminability corridors
    # Planner: terrain_mission_planner --start 0,0 --goal 800,800
    # All turns <= 18.6 deg (within 30 deg tailsitter limit)
    # Total outbound: 1257m, cable utilization: 20.9%
    # Note: start (0,0) excluded — vtol_navigation_node treats home as implicit origin
    waypoints:
      x: [32.4, 64.3, 110.9, 172.4, 594.3, 648.2, 695.2, 800.0]
      y: [291.4, 360.0, 416.4, 460.5, 590.4, 620.8, 661.1, 800.0]
      wp_time_s: [19.3, 7.2, 7.1, 7.2, 27.5, 6.4, 6.4, 12.7]

position_ekf_node:
  ros__parameters:
    spool_speed_scale: 0.95
    path_prior:
      enabled: true
      r_min: 25.0
      r_max: 10000.0
      disc_profile_length: 10
      disc_spacing: 12.0
      disc_corridor_width: 100.0
      disc_step: 50.0
      waypoints_x: [0.0, 32.4, 64.3, 110.9, 172.4, 594.3, 648.2, 695.2, 800.0]
      waypoints_y: [0.0, 291.4, 360.0, 416.4, 460.5, 590.4, 620.8, 661.1, 800.0]
