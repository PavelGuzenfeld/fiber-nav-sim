vtol_navigation_node:
  ros__parameters:
    cruise_altitude: 50.0             # [m] above home — low for fast iteration
    climb_rate: 4.0
    fw_accept_radius: 100.0
    mc_transition_dist: 200.0
    mc_approach_speed: 5.0
    fw_transition_timeout: 120.0
    mc_transition_timeout: 120.0

    terrain_follow:
      enabled: false               # off: TECS holds AMSL, rangefinder feeds TERCOM only
      target_agl: 40.0             # [m] unused when disabled
      kp: 0.2
      max_rate: 1.0
      rate_slew: 0.25             # [m/s] relaxed — feedforward compensates, higher AGL gives margin
      filter_tau: 3.0             # [s] heavy smoothing to damp terrain noise
      fallback_timeout: 30.0
      min_agl: 10.0
      max_agl: 200.0
      # Look-ahead parameters
      lookahead_time: 3.0
      lookahead_max: 100.0
      feedforward_gain: 0.5       # sensor-derived slope feedforward
      max_slope: 0.5
      slope_tau: 1.0              # [s] EMA filter for terrain slope estimation

    cable_monitor:
      enabled: true
      tension_warn_percent: 70.0
      tension_abort_percent: 85.0
      breaking_strength: 50.0
      spool_capacity: 7500.0       # m (-1 = unlimited)
      spool_warn_percent: 80.0
      spool_abort_percent: 95.0

    gimbal:
      enabled: true
      saturation_threshold: 0.7    # Start throttling above 70% gimbal range
      base_turn_rate: 5.0          # [deg/s] max course change when yaw gimbal is free
      min_turn_rate: 1.0           # [deg/s] min course change when yaw gimbal is saturated
      min_alt_rate_scale: 0.3      # Scale terrain altitude rate when pitch gimbal saturated

    gps_denied:
      enabled: false             # GPS-on for stable FW flight during gimbal testing
      wp_time_s: 25.0              # seconds per WP leg (400m at 18 m/s ~ 22s + margin)
      return_time_s: 90.0          # seconds of FW return (1600m at 18 m/s ~ 89s)
      descent_time_s: 30.0         # seconds of MC descent (50m at 3 m/s ~ 17s + margin)
      altitude_kp: 0.5             # P-gain for altitude hold
      altitude_max_vz: 3.0         # max vertical rate [m/s]
      fw_speed: 18.0               # FW cruise speed [m/s]
      use_position_ekf: false      # Pure time-based navigation (no EKF position)
      ekf_wp_accept_radius: 80.0   # WP acceptance radius when using EKF [m]
      ekf_home_accept_radius: 100.0  # Home acceptance radius when using EKF [m]
      ekf_max_uncertainty: 200.0   # Fallback to time-based if sigma > this [m]

    # Straight-line East heading: crosses N-S terrain ridge for TERCOM variation.
    # 4 waypoints at 400m spacing, 1600m total.
    # At 80m cruise, AGL varies 27-80m over terrain (141-194m MSL).
    # GPS disabled after FW transition — navigation uses fixed headings.
    # TERCOM accumulates rangefinder measurements for position fixes.
    waypoints:
      x: [0.0, 0.0, 0.0, 0.0]
      y: [400.0, 800.0, 1200.0, 1600.0]
