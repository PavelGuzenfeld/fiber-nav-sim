# Sensor simulation parameters

spool_sim_driver:
  ros__parameters:
    model_name: "plane"
    noise_stddev: 0.1      # m/s - Gaussian noise σ
    slack_factor: 1.05     # Over-payout bias (spool spins faster than drone flies)
    publish_rate: 50.0     # Hz
    moving_threshold: 0.05 # m/s - Below this, spool reports not moving

vision_direction_sim:
  ros__parameters:
    model_name: "plane"
    drift_rate: 0.001      # rad/s - Random walk drift rate
    min_velocity: 0.5      # m/s - Below this, direction is unreliable

cable_dynamics_node:
  ros__parameters:
    world_name: "terrain_world"
    model_name: "quadtailsitter"
    enabled: true
    mass_per_meter: 0.003        # 3 g/m jacketed fiber
    diameter: 0.0009             # 0.9 mm
    breaking_strength: 50.0      # N
    drag_coefficient: 1.1        # Cd for thin cylinder in crossflow
    drag_shape_factor: 0.4       # fraction of airborne length in crossflow
    spool_friction_static: 0.5   # N (constant payout resistance)
    spool_friction_kinetic: 0.02 # N/(m/s) (velocity-dependent friction)
    air_density: 1.225           # kg/m³
    update_rate: 50.0            # Hz
    # Visual cable rendering (Gazebo markers — oriented cylinders along cable)
    visual_enabled: true         # Show cable in Gazebo
    visual_segments: 30          # Number of cylinder segments (ground + airborne)
    visual_color_r: 0.1          # Cable color red component (0-1)
    visual_color_g: 1.0          # Cable color green component (0-1)
    visual_color_b: 0.1          # Cable color blue component (0-1)
    visual_color_a: 1.0          # Cable color alpha (0-1)
    visual_width: 0.15           # Cable diameter in meters (cylinder thickness)
    visual_rate: 10.0            # Visual update rate (Hz)

fiber_vision_fusion:
  ros__parameters:
    slack_factor: 1.05     # Must match spool sensor (or estimate adaptively)
    publish_rate: 50.0     # Hz
    max_data_age: 0.1      # seconds - Reject stale data
    zupt_threshold: 0.05   # m/s - Speed below this triggers ZUPT
    zupt_velocity_variance: 0.001  # Velocity variance during ZUPT
    velocity_variance: 0.01        # Velocity variance during normal flight (MC/FW)
    transition_velocity_variance: 0.04  # Velocity variance during VTOL transitions
    enable_position_clamping: true
    k_drag: 0.0005         # Drag bow coefficient
    tunnel_heading_deg: 90.0  # NED heading of tunnel axis (deg, 90=East)
    position_variance_longitudinal: 1.0   # Position σ² along tunnel
    position_variance_lateral: 100.0      # Position σ² perpendicular
    health_window_size: 50                # Rolling window for sensor health (samples)
    health_warn_threshold: 80.0           # Log warning when health drops below this (%)
