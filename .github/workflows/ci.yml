name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: fiber-nav-sim:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests
        run: |
          docker run --rm fiber-nav-sim:ci bash -c "
            source /opt/ros/jazzy/setup.bash &&
            source /root/ws/install/setup.bash &&
            echo '=== Running Unit Tests ===' &&
            /root/ws/build/fiber_nav_fusion/test_fusion &&
            /root/ws/build/fiber_nav_sensors/test_spool_sensor &&
            /root/ws/build/fiber_nav_sensors/test_vision_sensor &&
            /root/ws/build/fiber_nav_mode/test_canyon_waypoints &&
            /root/ws/build/fiber_nav_mode/test_vtol_navigation &&
            /root/ws/build/fiber_nav_mode/test_terrain_altitude_controller &&
            echo '=== All Unit Tests Passed ==='
          "

      - name: Run linter tests
        run: |
          docker run --rm fiber-nav-sim:ci bash -c "
            source /opt/ros/jazzy/setup.bash &&
            cd /root/ws/src/fiber-nav-sim/src/fiber_nav_bringup &&
            echo '=== Running Linter Tests ===' &&
            /opt/ros/jazzy/bin/ament_copyright &&
            /opt/ros/jazzy/bin/ament_flake8 &&
            /opt/ros/jazzy/bin/ament_pep257 &&
            echo '=== All Linter Tests Passed ==='
          "

      - name: Run 20km benchmark
        run: |
          docker run --rm fiber-nav-sim:ci bash -c "
            source /opt/ros/jazzy/setup.bash &&
            echo '=== Running 20km Benchmark ===' &&
            python3 /root/ws/src/fiber-nav-sim/scripts/generate_20km_flight.py 20.0 /tmp/flight.csv &&
            python3 /root/ws/src/fiber-nav-sim/scripts/compare_three_way.py /tmp/flight.csv
          "

      - name: Run analysis tests
        run: |
          docker run --rm fiber-nav-sim:ci bash -c "
            cd /root/ws/src/fiber-nav-sim/scripts &&
            python3 -m pytest test_analysis.py -v
          "
