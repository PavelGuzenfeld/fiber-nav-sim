services:
  # Full simulation with Gazebo Harmonic GUI
  simulation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fiber-nav-sim
    privileged: true
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=0
      # Gazebo Harmonic environment
      - GZ_SIM_RESOURCE_PATH=/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/models:/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/worlds
      # PX4 environment (optional)
      - PX4_SIM_MODEL=gz_x500
      - PX4_GZ_MODEL_POSE=0,0,50,0,0,0
    volumes:
      # X11 for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      # Source code (for live editing)
      - ../:/root/ws/src/fiber-nav-sim:rw
      # Data directory for recordings
      - ../data:/root/data:rw
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
    command: >
      bash -c "
        ros2 launch fiber_nav_bringup simulation.launch.py
      "

  # Standalone mode (no PX4, uses mock attitude, auto-fly enabled)
  # Uses headless mode with software rendering for cameras
  standalone:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fiber-nav-standalone
    privileged: true
    network_mode: host
    environment:
      - GZ_SIM_RESOURCE_PATH=/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/models:/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/worlds
      - QT_QPA_PLATFORM=offscreen
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3
    volumes:
      - ../:/root/ws/src/fiber-nav-sim:rw
      - ../data:/root/data:rw
    stdin_open: true
    tty: true
    command: >
      bash -c "
        ros2 launch fiber_nav_bringup simulation.launch.py use_px4:=false auto_fly:=true headless:=true
      "

  # Foxglove visualization - web-based ROS 2 visualization
  # Access at http://localhost:8765 with Foxglove Studio
  foxglove:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fiber-nav-foxglove
    network_mode: host
    environment:
      - GZ_SIM_RESOURCE_PATH=/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/models:/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/worlds
    volumes:
      - ../:/root/ws/src/fiber-nav-sim:rw
    command: >
      bash -c "
        apt-get update && apt-get install -y ros-jazzy-foxglove-bridge &&
        source /opt/ros/jazzy/setup.bash &&
        source /root/ws/install/setup.bash &&
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765
      "

  # Analysis/Jupyter notebook service
  analysis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fiber-nav-analysis
    network_mode: host
    ports:
      - "8888:8888"
    volumes:
      - ../:/root/ws/src/fiber-nav-sim:rw
      - ../data:/root/data:rw
    command: >
      bash -c "
        pip install jupyter &&
        cd /root/data &&
        jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      "

  # Headless simulation for CI/testing
  ci:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fiber-nav-ci
    network_mode: host
    environment:
      - DISPLAY=:99
      - LIBGL_ALWAYS_SOFTWARE=1
      - GZ_SIM_RESOURCE_PATH=/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/models:/root/ws/src/fiber-nav-sim/src/fiber_nav_gazebo/worlds
    command: >
      bash -c "
        Xvfb :99 -screen 0 1024x768x24 &
        sleep 2 &&
        cd /root/ws &&
        source install/setup.bash &&
        colcon build --symlink-install --packages-skip px4_msgs &&
        colcon test --packages-skip px4_msgs &&
        colcon test-result --verbose
      "

  # Build and test only (no simulation)
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fiber-nav-test
    volumes:
      - ../:/root/ws/src/fiber-nav-sim:rw
    command: >
      bash -c "
        cd /root/ws &&
        source install/setup.bash &&
        colcon build --symlink-install --packages-skip px4_msgs &&
        colcon test --packages-skip px4_msgs &&
        colcon test-result --verbose
      "
